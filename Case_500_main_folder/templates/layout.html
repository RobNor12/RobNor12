<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Case-Shiller vs S&P 500{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }

        header {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 6px;
        }

        .controls button {
            margin-right: 10px;
            padding: 8px 14px;
            cursor: pointer;
        }

        img {
            max-width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>Case-Shiller vs S&P 500 Reports</header>

        {% block content %}{% endblock %}
    </div>

</body>
</html>
